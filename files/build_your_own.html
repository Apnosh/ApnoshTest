// ── HELPERS ──────────────────────────────────────
function fmt(n) { return "$" + n.toLocaleString(); }

function calcServiceCost(svc, val) {
  if (!val || val.active === false) return { monthly: 0, setup: 0 };
  if (svc.type === "toggle") return { monthly: svc.monthly, setup: svc.setup };
  if (svc.type === "tier") {
    var t = svc.tiers[val.tier || 0];
    if (t.contact) return { monthly: 0, setup: 0 };
    return { monthly: t.monthly, setup: t.setup };
  }
  if (svc.type === "qty") {
    var q = val.qty || 1;
    var unitMo = svc.unitMonthly;
    var unitOt = svc.unitSetup;
    if (svc.bundleAt && q >= svc.bundleAt) unitMo = svc.bundlePrice || unitMo;
    return { monthly: unitMo * q, setup: unitOt * q };
  }
  return { monthly: 0, setup: 0 };
}

function getSelection(id) { return selections[id] || null; }

function setSelection(id, val) {
  if (val === null) { delete selections[id]; }
  else { selections[id] = val; }
  updateTotals();
}

function sectionHasSelections(sIdx) {
  var sec = SECTIONS[sIdx];
  return sec.groups.some(function(g) {
    return g.services.some(function(svc) {
      var sel = getSelection(svc.id);
      return sel && sel.active !== false;
    });
  });
}

function calcSectionTotals(sIdx) {
  var mo = 0, setup = 0;
  SECTIONS[sIdx].groups.forEach(function(g) {
    g.services.forEach(function(svc) {
      var sel = getSelection(svc.id);
      if (sel && sel.active !== false) {
        var c = calcServiceCost(svc, sel);
        mo += c.monthly; setup += c.setup;
      }
    });
  });
  return { monthly: mo, setup: setup };
}

// ── CALC TOTALS ──────────────────────────────────
function calcGrandTotals() {
  var mo = 0, setup = 0;
  SECTIONS.forEach(function(sec) {
    sec.groups.forEach(function(g) {
      g.services.forEach(function(svc) {
        var sel = getSelection(svc.id);
        if (sel && sel.active !== false) {
          var c = calcServiceCost(svc, sel);
          mo += c.monthly; setup += c.setup;
        }
      });
    });
  });
  return { monthly: mo, setup: setup };
}

function getLineItems() {
  var lines = [];
  SECTIONS.forEach(function(sec) {
    sec.groups.forEach(function(g) {
      g.services.forEach(function(svc) {
        var sel = getSelection(svc.id);
        if (!sel || sel.active === false) return;
        var c = calcServiceCost(svc, sel);
        if (c.monthly === 0 && c.setup === 0) return;
        var label = svc.name;
        if (svc.type === "tier" && sel.tier !== undefined) {
          var t = svc.tiers[sel.tier];
          if (t && !t.contact) label += " — " + t.name.split(" —")[0];
        }
        if (svc.type === "qty") label += " x" + (sel.qty || 1);
        lines.push({ label: label, monthly: c.monthly, setup: c.setup });
      });
    });
  });
  return lines;
}

// ── RENDER TABS ──────────────────────────────────
function renderTabs() {
  var c = document.getElementById("tabs");
  c.innerHTML = "";
  SECTIONS.forEach(function(sec, i) {
    var hasSel = sectionHasSelections(i);
    var t = calcSectionTotals(i);
    var btn = document.createElement("button");
    btn.className = "tab-btn" + (i === activeTab ? " active" : "");
    btn.innerHTML = '<span class="tab-icon">' + sec.icon + '</span>'
      + '<span class="tab-label">' + sec.label + '</span>'
      + '<span class="tab-sub">' + sec.sub + '</span>'
      + (hasSel ? '<span class="tab-badge">' + (t.monthly ? fmt(t.monthly) + "/mo" : fmt(t.setup)) + '</span>' : '');
    btn.onclick = (function(idx) { return function() { switchTab(idx); }; })(i);
    c.appendChild(btn);
  });
}

function switchTab(idx) {
  activeTab = idx;
  renderTabs();
  renderSection();
}

// ── RENDER SECTION ───────────────────────────────
function renderSection() {
  var sec = SECTIONS[activeTab];
  var html = '<div class="section-card">'
    + '<p class="section-title">' + sec.title + '</p>'
    + '<p class="section-sub">' + sec.description + '</p>';

  sec.groups.forEach(function(g) {
    html += '<div class="service-group">'
      + '<p class="service-group-title">' + g.title + '</p>';

    g.services.forEach(function(svc) {
      var sel = getSelection(svc.id);
      var isOn = sel && sel.active !== false;

      if (svc.comingSoon) {
        html += '<div class="service-wrap">'
          + '<div class="service-row">'
          + '<div class="service-info"><p class="service-name">' + svc.name + '</p><p class="service-desc">' + svc.desc + '</p></div>'
          + '<span class="contact-pill" style="background:#faeeda;color:#854f0b">Coming soon</span>'
          + '</div>'
          + '</div>';
        return;
      }

      html += '<div class="service-wrap"><div class="service-row">';
      html += '<div class="service-info"><p class="service-name">' + svc.name + '</p><p class="service-desc">' + svc.desc + '</p></div>';

      if (svc.type === "toggle") {
        var price = svc.monthly ? fmt(svc.monthly) + "/mo" : (svc.setup ? "+" + fmt(svc.setup) : "");
        html += '<span class="service-price">' + price + '</span>';
        html += '<button class="service-toggle ' + (isOn ? "on" : "off") + '" onclick="toggleSvc(\'' + svc.id + '\')">'
          + '<div class="service-toggle-thumb"></div></button>';
      }

      if (svc.type === "tier") {
        var curTier = isOn ? (sel.tier || 0) : -1;
        html += '<select class="tier-select" onchange="tierSvc(\'' + svc.id + '\', this.value)">';
        html += '<option value="-1"' + (curTier === -1 ? " selected" : "") + '>Not included</option>';
        svc.tiers.forEach(function(t, i) {
          var priceStr = t.contact ? "Custom pricing" : (t.monthly ? fmt(t.monthly) + "/mo" : (t.setup ? "+" + fmt(t.setup) : "Included"));
          html += '<option value="' + i + '"' + (curTier === i ? " selected" : "") + '>' + t.name + ' — ' + priceStr + '</option>';
        });
        html += '</select>';
      }

      if (svc.type === "qty") {
        var curQty = isOn ? (sel.qty || 0) : 0;
        var unitPrice = svc.unitMonthly || svc.unitSetup;
        var isMonthly = !!svc.unitMonthly;
        var priceLabel = isMonthly ? fmt(unitPrice) + " per " + svc.unit + "/mo" : fmt(unitPrice) + "/" + svc.unit;
        var bundleTag = svc.bundleAt ? '<span style="display:inline-block;margin-top:3px;font-size:10px;font-weight:600;background:#eaf3de;color:#1D9E75;padding:2px 7px;border-radius:99px;white-space:nowrap">&#10003; Save at 2+</span>' : '';
        html += '<span class="service-price" style="font-size:11px;max-width:120px;text-align:right;white-space:normal;display:flex;flex-direction:column;align-items:flex-end;gap:2px">' + priceLabel + bundleTag + '</span>';
        html += '<div class="qty-wrap">'
          + '<button class="qty-btn" onclick="qtyChange(\'' + svc.id + '\',-1)">-</button>'
          + '<span class="qty-val" id="qty-' + svc.id + '">' + curQty + '</span>'
          + '<button class="qty-btn" onclick="qtyChange(\'' + svc.id + '\',1)">+</button>'
          + '</div>';
      }

      html += '</div>'; // close service-row

      if (svc.explainer) {
        var expId = "exp-" + svc.id;
        html += "<div style='padding:2px 0 8px'>"
          + "<button class='explainer-toggle' data-exp='" + expId + "'>"
          + "<span class='explainer-arrow' id='arr-" + expId + "'>&#9658;</span>"
          + " What is this for?</button>"
          + "<div class='explainer-box' id='" + expId + "'>" + svc.explainer + "</div>"
          + "</div>";
      }

      html += '</div>'; // close service-wrap
    });

    html += '</div>'; // close service-group
  });

  // Section subtotal
  var st = calcSectionTotals(activeTab);
  if (st.monthly > 0 || st.setup > 0) {
    html += '<div class="section-subtotal">'
      + '<span class="section-subtotal-label">Section subtotal</span>'
      + '<div class="section-subtotal-vals">'
      + (st.monthly ? '<span class="subtotal-mo">' + fmt(st.monthly) + '/mo</span>' : '')
      + (st.setup ? '<span class="subtotal-ot">+' + fmt(st.setup) + ' setup</span>' : '')
      + '</div></div>';
  }

  // Nav
  html += '<div class="section-nav">';
  if (activeTab > 0) html += '<button class="nav-btn nav-btn-back" onclick="switchTab(' + (activeTab - 1) + ')">Back</button>';
  else html += '<span></span>';
  if (activeTab < SECTIONS.length - 1) {
    html += '<button class="nav-btn nav-btn-next" onclick="switchTab(' + (activeTab + 1) + ')">Next: ' + SECTIONS[activeTab + 1].label + '</button>';
  } else {
    html += '<button class="nav-btn nav-btn-next" onclick="finalize()">Review my plan</button>';
  }
  html += '</div>';

  html += '</div>'; // close section-card
  document.getElementById("section-content").innerHTML = html;
}


// ── INTERACTION ──────────────────────────────────
function toggleSvc(id) {
  var sel = getSelection(id);
  if (sel && sel.active !== false) {
    setSelection(id, null);
  } else {
    setSelection(id, { active: true });
  }
  renderSection();
}

function tierSvc(id, val) {
  val = parseInt(val);
  if (val === -1) {
    setSelection(id, null);
  } else {
    setSelection(id, { active: true, tier: val });
  }
  renderSection();
}

function findSvc(id) {
  for (var si = 0; si < SECTIONS.length; si++) {
    for (var gi = 0; gi < SECTIONS[si].groups.length; gi++) {
      for (var vi = 0; vi < SECTIONS[si].groups[gi].services.length; vi++) {
        if (SECTIONS[si].groups[gi].services[vi].id === id) return SECTIONS[si].groups[gi].services[vi];
      }
    }
  }
  return null;
}

function qtyChange(id, delta) {
  var sel = getSelection(id);
  var curQty = (sel && sel.active !== false) ? (sel.qty || 0) : 0;
  var newQty = Math.max(0, curQty + delta);
  if (newQty === 0) {
    setSelection(id, null);
  } else {
    setSelection(id, { active: true, qty: newQty });
  }
  var el = document.getElementById("qty-" + id);
  if (el) el.textContent = newQty;
  updateTotals();
}

// ── TOTALS ───────────────────────────────────────
function updateTotals() {
  var totals = calcGrandTotals();
  var lines = getLineItems();
  var hasAny = lines.length > 0;

  var sbLines = document.getElementById("sidebar-lines");
  var sbDiv = document.getElementById("sidebar-divider");
  var sbTotals = document.getElementById("sidebar-totals");
  var sbCta = document.getElementById("sidebar-cta");

  if (hasAny) {
    var html = "";
    lines.forEach(function(l) {
      html += '<div class="sidebar-line">'
        + '<span class="sidebar-line-label">' + l.label + '</span>'
        + '<span class="sidebar-line-val">'
        + (l.monthly ? fmt(l.monthly) + "/mo" : "+" + fmt(l.setup))
        + '</span></div>';
    });
    sbLines.innerHTML = html;
    if (sbDiv) sbDiv.style.display = "";
    if (sbTotals) sbTotals.style.display = "";
    document.getElementById("sb-monthly").textContent = totals.monthly ? fmt(totals.monthly) + "/mo" : "—";
    document.getElementById("sb-setup").textContent = totals.setup ? fmt(totals.setup) : "—";
    if (sbCta) sbCta.disabled = false;
  } else {
    sbLines.innerHTML = '<p class="sidebar-empty">Add services to see your plan here</p>';
    if (sbDiv) sbDiv.style.display = "none";
    if (sbTotals) sbTotals.style.display = "none";
    if (sbCta) sbCta.disabled = true;
  }

  var configured = SECTIONS.filter(function(s, i) { return sectionHasSelections(i); }).length;
  var progLabel = document.getElementById("prog-label");
  var progFill = document.getElementById("prog-fill");
  if (progLabel) progLabel.textContent = configured + " of " + SECTIONS.length + " sections configured";
  if (progFill) progFill.style.width = Math.round(configured / SECTIONS.length * 100) + "%";

  var stickyMo = document.getElementById("sticky-monthly");
  var stickySetup = document.getElementById("sticky-setup");
  if (stickyMo) stickyMo.textContent = totals.monthly ? fmt(totals.monthly) : "$0";
  if (stickySetup) stickySetup.textContent = totals.setup ? fmt(totals.setup) : "$0";

  if (hasAny) {
    var dHtml = "";
    lines.forEach(function(l) {
      dHtml += '<div class="sticky-drawer-line">'
        + '<span class="sticky-drawer-label">' + l.label + '</span>'
        + '<span class="sticky-drawer-val">' + (l.monthly ? fmt(l.monthly) + "/mo" : "+" + fmt(l.setup)) + '</span>'
        + '</div>';
    });
    var drawer = document.getElementById("sticky-drawer");
    if (drawer) drawer.innerHTML = dHtml;
  }

  renderTabs();
}

function toggleDrawer() {
  drawerOpen = !drawerOpen;
  var drawer = document.getElementById("sticky-drawer");
  var btn = document.getElementById("sticky-expand-btn");
  if (drawer) drawer.classList.toggle("open", drawerOpen);
  if (btn) btn.textContent = drawerOpen ? "Hide plan details ▴" : "Show plan details ▾";
}

function resetAll() {
  if (!confirm("Clear all your selections?")) return;
  selections = {};
  updateTotals();
  renderSection();
}

function finalize() {
  alert("Get Started flow coming soon — your plan will be saved and sent to our team!");
}

// ── INIT ─────────────────────────────────────────
// Event delegation for explainer toggles
document.getElementById("section-content").addEventListener("click", function(e) {
  var btn = e.target.closest("[data-exp]");
  if (!btn) return;
  var id = btn.getAttribute("data-exp");
  var box = document.getElementById(id);
  var arr = document.getElementById("arr-" + id);
  if (box) box.classList.toggle("open");
  if (arr) arr.classList.toggle("open");
});

renderTabs();
renderSection();
updateTotals();
</script>
</body>
</html>
