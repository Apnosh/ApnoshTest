// ── RECOMMENDATION ENGINE ─────────────────────────────────────────
function buildPlan(budget, funnelIdx, presenceIdx, challenges, goals, handsonIdx, timelineIdx, ind, locIdx, assets) {
  locIdx = locIdx || 0;
  assets = assets || [];
  var iL = (ind || "").toLowerCase();

  // ── INDUSTRY FLAGS ──────────────────────────────────────────────
  var isRest  = iL.indexOf("restaurant") > -1 || iL.indexOf("food") > -1;
  var isWell  = iL.indexOf("health") > -1 || iL.indexOf("wellness") > -1;
  var isSvc   = iL.indexOf("service") > -1 || iL.indexOf("trade") > -1;
  var isPro   = iL.indexOf("professional") > -1;
  var isRE    = iL.indexOf("real estate") > -1;
  var isRetail = iL.indexOf("retail") > -1 || iL.indexOf("ecommerce") > -1 || iL.indexOf("e-commerce") > -1;
  var isLocal  = isRest || isWell || isSvc;

  // ── ASSET FLAGS ─────────────────────────────────────────────────
  var hasLogo       = assets.indexOf(0) > -1;
  var hasGuidelines = assets.indexOf(1) > -1;
  var hasPhotos     = assets.indexOf(2) > -1;
  var hasVideo      = assets.indexOf(3) > -1;
  var hasWebsite    = assets.indexOf(4) > -1;
  var hasSocial     = assets.indexOf(5) > -1;
  var hasEmailList  = assets.indexOf(6) > -1;
  var hasNothing    = assets.indexOf(7) > -1 || assets.length === 0;

  // ── LOCATION FLAGS ──────────────────────────────────────────────
  var isSingle = locIdx === 0;
  var isMulti  = locIdx > 0;
  var isLarge  = locIdx >= 2; // 4+ locations

  // ══════════════════════════════════════════════════════════════
  // BASE SCORES
  // Higher = more likely to be included and at a higher tier
  // ══════════════════════════════════════════════════════════════
  var sc = {};

  // ── WEBSITE ─────────────────────────────────────────────────────
  // Always core. Single location = basic/standard. Multi = standard/advanced.
  // If they have no assets at all, website is the #1 priority.
  sc.website = hasNothing ? 10 : hasWebsite ? 5 : 9;
  if (isLarge) sc.website = Math.min(sc.website + 2, 10);

  // ── HOSTING ─────────────────────────────────────────────────────
  // Always included. Single = basic. Multi/larger = growth/pro.
  sc.hosting = 10;

  // ── LOCAL SEO ───────────────────────────────────────────────────
  // Single location: starter/growth is enough. Multi: authority essential.
  // Direct sales drivers (website, GBP, SEO) are highest priority for single location.
  sc.localSeo = isSingle ? 9 : isMulti ? 10 : 8;
  if (funnelIdx === 0 || funnelIdx === 1) sc.localSeo = Math.min(sc.localSeo + 1, 10);
  if (presenceIdx <= 1) sc.localSeo = Math.min(sc.localSeo + 1, 10);

  // ── GBP ─────────────────────────────────────────────────────────
  // Critical for single-location direct sales. Lower priority if already established.
  sc.gbp = presenceIdx <= 1 ? 10 : presenceIdx <= 3 ? 7 : 4;
  if (isSingle) sc.gbp = Math.min(sc.gbp + 1, 10); // single loc = GBP is THE local signal

  // ── REVIEW SYSTEM ───────────────────────────────────────────────
  // High priority for local/service businesses. Less for retail/pro.
  sc.reviewSys   = (isLocal || funnelIdx === 4) ? 8 : 5;
  sc.reviewAuto  = (isLocal || funnelIdx === 4) ? 7 : 4;

  // ── SOCIAL MEDIA MANAGEMENT ─────────────────────────────────────
  // Single location: essentials/starter sufficient unless social is a goal.
  // Multi: growth/pro more relevant for brand consistency.
  sc.smm = isSingle ? (hasSocial ? 6 : 8) : 9;
  if (funnelIdx === 0 || goals.indexOf(2) > -1) sc.smm = Math.min(sc.smm + 2, 10);

  // Social Ads: high priority for single/small locations wanting more customers/local sales
  // Score based on funnel (leads/awareness) + location type + goals
  sc.socialAds = 0; // default off
  if (funnelIdx === 1) sc.socialAds = isSingle ? 10 : 8;      // generate leads = top priority
  else if (funnelIdx === 0) sc.socialAds = isSingle ? 9 : 7;  // awareness = very high
  else if (goals.indexOf(0) > -1) sc.socialAds = isSingle ? 9 : 6; // more customers goal
  else if (goals.indexOf(1) > -1) sc.socialAds = isSingle ? 8 : 6; // local/maps goal
  else if (isSingle) sc.socialAds = 6; // single location always benefits
  // Multi-large locations less emphasis (brand spend differs)
  if (isLarge) sc.socialAds = Math.max(sc.socialAds - 3, 0);

  // ── CONTENT — FEED POSTS ────────────────────────────────────────
  sc.feedPosts = 8;
  if (!hasSocial) sc.feedPosts = Math.min(sc.feedPosts + 1, 10);

  // ── CONTENT — STORIES ───────────────────────────────────────────
  sc.stories = presenceIdx >= 2 ? 7 : 5;

  // ── CONTENT — CAROUSELS ─────────────────────────────────────────
  // Better for established social presence
  sc.carousels = (presenceIdx >= 2 && budget > 1200) ? 7 : 4;

  // ── CONTENT — VIDEO ─────────────────────────────────────────────
  // If they have no video, highly recommend. If budget allows.
  sc.video = !hasVideo ? (budget > 1000 ? 9 : 6) : (budget > 2000 ? 6 : 3);
  if (goals.indexOf(2) > -1) sc.video = Math.min(sc.video + 1, 10); // social goal
  if (isRest || isWell) sc.video = Math.min(sc.video + 1, 10); // visual industries

  // ── EMAIL & SMS ─────────────────────────────────────────────────
  // High value if they have a list already. Retention funnel = very high.
  sc.email = hasEmailList ? 9 : funnelIdx === 3 ? 9 : funnelIdx === 2 ? 8 : budget > 1500 ? 6 : 4;

  // ── BRANDING ────────────────────────────────────────────────────
  // If they have nothing: branding is top priority
  // If they have logo but no guidelines: recommend guidelines tier
  // If they have both: low priority (already done)
  // Photos missing: push photography (handled separately in "also")
  sc.branding = hasNothing ? 10
    : (!hasLogo) ? 9
    : (!hasGuidelines) ? 6
    : (hasLogo && hasGuidelines) ? 1
    : 4;
  if (funnelIdx === 4) sc.branding = Math.min(sc.branding + 2, 10); // brand reputation goal
  if (goals.indexOf(3) > -1) sc.branding = Math.min(sc.branding + 2, 10); // brand identity goal

  // ══════════════════════════════════════════════════════════════
  // CHALLENGE ADJUSTMENTS
  // ══════════════════════════════════════════════════════════════
  challenges.forEach(function(c) {
    if (c === 0) { sc.localSeo += 2; sc.gbp += 2; }                    // not found online
    if (c === 1) { sc.website += 1; sc.reviewSys += 1; }               // traffic no leads
    if (c === 2) { sc.localSeo += 2; sc.branding += 1; sc.video += 1; } // losing competitors
    if (c === 4) { sc.branding += 3; sc.website += 1; }               // looks unprofessional
    if (c === 5) { sc.smm += 2; sc.feedPosts += 2; sc.video += 2; }   // no consistent content
  });

  // ══════════════════════════════════════════════════════════════
  // GOAL ADJUSTMENTS
  // ══════════════════════════════════════════════════════════════
  goals.forEach(function(g) {
    if (g === 0) { sc.localSeo += 1; sc.gbp += 1; sc.website += 1; }  // more customers — direct sales
    if (g === 1) { sc.localSeo += 2; sc.gbp += 2; }                   // local/maps
    if (g === 2) { sc.smm += 2; sc.video += 2; sc.feedPosts += 1; }   // social media
    if (g === 3) { sc.branding += 3; }                                  // brand identity
    if (g === 4) { sc.website += 2; }                                   // website
  });

  // ══════════════════════════════════════════════════════════════
  // FUNNEL ADJUSTMENTS
  // ══════════════════════════════════════════════════════════════
  if (funnelIdx === 0) { sc.smm += 1; sc.feedPosts += 1; sc.video += 1; }         // awareness
  if (funnelIdx === 1) { sc.website += 1; sc.gbp += 1; sc.localSeo += 1; }        // leads/sales
  if (funnelIdx === 2) { sc.email += 2; sc.reviewSys += 1; }                       // convert
  if (funnelIdx === 3) { sc.email += 3; }                                            // retention
  if (funnelIdx === 4) { sc.reviewSys += 2; sc.reviewAuto += 2; sc.branding += 1; } // reputation

  // ══════════════════════════════════════════════════════════════
  // LOCATION MULTI-BOOST
  // ══════════════════════════════════════════════════════════════
  if (isMulti) {
    sc.localSeo = Math.min(sc.localSeo + locIdx * 1.5, 10);
    sc.gbp      = Math.min(sc.gbp + locIdx, 10);
  }

  // ══════════════════════════════════════════════════════════════
  // TIER SELECTION LOGIC
  // Single location = lower tiers preferred
  // Multi location = higher tiers preferred
  // Budget bias for tier selection
  // ══════════════════════════════════════════════════════════════
  function tierIdx(key, bias) {
    var svc = CAT[key];
    if (!svc || svc.type !== "tier") return 0;
    var len = svc.tiers.length;

    // Single location: cap most services at tier 1 (index 1) unless budget is high
    var cap = isSingle ? (budget > 3000 ? len - 1 : Math.min(1, len - 1)) : len - 1;

    if (bias < 0.35) return 0;
    if (bias < 0.6)  return Math.min(1, cap);
    if (bias < 0.85) return Math.min(Math.round(len * 0.6), cap);
    return cap;
  }

  var keys = Object.keys(sc).sort(function(a, b) { return sc[b] - sc[a]; });

  function assemble(maxMo, maxSetup, bias) {
    var mo = 0, setup = 0, inc = {};

    // Always include website + hosting at appropriate tier
    var wt = isSingle ? (bias < 0.5 ? 0 : bias < 0.8 ? 1 : 2) : (bias < 0.4 ? 1 : 2);
    var ht = isSingle ? (bias < 0.5 ? 0 : bias < 0.8 ? 1 : 2) : (bias < 0.6 ? 1 : 2);
    wt = Math.min(wt, CAT.website.tiers.length - 1);
    ht = Math.min(ht, CAT.hosting.tiers.length - 1);
    inc.website = wt;
    inc.hosting = ht;
    setup += CAT.website.tiers[wt].setup;
    mo    += CAT.hosting.tiers[ht].monthly;

    keys.forEach(function(key) {
      if (key === "website" || key === "hosting") return;
      var svc = CAT[key];
      if (!svc) return;

      if (svc.type === "toggle") {
        if (sc[key] >= 6 && mo + svc.monthly <= maxMo && setup + svc.setup <= maxSetup) {
          inc[key] = true;
          mo    += svc.monthly;
          setup += svc.setup;
        }
      } else if (svc.type === "tier") {
        var t = tierIdx(key, bias);
        while (t > 0) {
          var tier = svc.tiers[t];
          if (mo + tier.monthly <= maxMo && setup + tier.setup <= maxSetup) break;
          t--;
        }
        var tier0 = svc.tiers[t];
        if (sc[key] >= 5 && mo + tier0.monthly <= maxMo && setup + tier0.setup <= maxSetup) {
          inc[key] = t;
          mo    += tier0.monthly;
          setup += tier0.setup;
        }
      }
    });

    // Social Ads: add if score >= 6, allocate 20% of total budget as ad spend
    if (sc.socialAds >= 6) {
      var adsBudget = Math.round(maxMo * 0.20);
      if (adsBudget >= 100) {
        inc.socialAds = adsBudget;
        mo += adsBudget;
      }
    }

    return { inc: inc, monthly: mo, setup: setup };
  }

  return {
    optimal: assemble(budget,        budget * 5,  0.65),
    starter: assemble(budget * 0.95, budget * 3,  0.3),
    stretch: assemble(budget * 1.1,  budget * 8,  0.9)
  };
}


function planLines(planObj) {
  var lines = [];
  Object.keys(planObj.inc).forEach(function(key) {
    var svc = CAT[key];
    if (!svc) return;
    var val = planObj.inc[key];
    if (svc.type === "toggle" && val === true) {
      lines.push({ label: svc.label, setup: svc.setup, monthly: svc.monthly });
    } else if (svc.type === "tier" && val !== undefined) {
      var t = svc.tiers[val];
      lines.push({ label: svc.label + " — " + t.name, setup: t.setup, monthly: t.monthly });
    } else if (svc.type === "dynamic" && typeof val === "number") {
      lines.push({ label: svc.label + " — " + fmt(val) + "/mo ad spend (recommended)", setup: 0, monthly: val, note: svc.note });
    }
  });
  return lines;
}

// ── HELPERS ───────────────────────────────────────────────────────
function fmt(n) { return "$" + n.toLocaleString(); }

function budgetTag(planMo, budget) {
  var diff = planMo - budget;
  if (diff <= 0) return fmt(Math.abs(diff)) + " under";
  return fmt(diff) + " over";
}

function whyText(slot, planMo, budget, funnelIdx, challenges, goals) {
  var fLabels = ["building awareness", "generating more leads and sales", "converting leads into customers",
                 "keeping customers coming back", "building a stronger brand reputation", "automating and scaling efficiently"];
  var fl = funnelIdx > -1 ? fLabels[funnelIdx] : "";
  if (slot === 0) return "A smart starting point that gets you real results without overextending. Everything included here delivers measurable ROI from month one.";
  if (slot === 1) return (fl ? "Built around your priority of " + fl + ". " : "") + "This is the strongest plan we can build within your " + fmt(budget) + "/mo budget — every service directly moves your numbers.";
  return "This is the plan built specifically for your goals" + (fl ? " — especially " + fl : "") + ". At " + fmt(planMo) + "/mo it is " + fmt(planMo - budget) + " above your stated budget, but delivers significantly stronger results and pays for itself faster.";
}

function industryName(ind, si) {
  var iL = (ind || "").toLowerCase();
  // si 0 = optimal (best fit), si 1 = starter (below budget), si 2 = stretch (above budget)
  var names = {
    restaurant:   ["Full House",          "The First Table",    "The Packed House"],
    wellness:     ["Fully Booked",        "Open for Business",  "The Wellness Brand"],
    service:      ["More Leads",          "The First Call",     "The Lead Machine"],
    professional: ["The Authority Builder","The Practice Launch","The Thought Leader"],
    realestate:   ["The Agent",           "The Listing",        "The Top Producer"]
  };
  var tierNames = ["The Growth Starter", "The Digital Launchpad", "The Digital Overhaul"];
  var t = si;

  if (iL.indexOf("restaurant") > -1 || iL.indexOf("food") > -1) return names.restaurant[Math.min(t, 2)];
  if (iL.indexOf("health") > -1 || iL.indexOf("wellness") > -1) return names.wellness[Math.min(t, 2)];
  if (iL.indexOf("service") > -1 || iL.indexOf("trade") > -1)  return names.service[Math.min(t, 2)];
  if (iL.indexOf("professional") > -1) return names.professional[Math.min(t, 2)];
  if (iL.indexOf("real estate") > -1)  return names.realestate[Math.min(t, 2)];
  return tierNames[Math.min(t, 2)];
}

// ── RENDER QUIZ ───────────────────────────────────────────────────
function render() {
  if (currentQ >= Q.length) { showLoading(); return; }
  var q = Q[currentQ];
  var pct = Math.round((currentQ / Q.length) * 100);
  var hasAns = q.type === "multi"
    ? (Array.isArray(answers[q.id]) && answers[q.id].length > 0)
    : q.type === "budget" ? true
    : answers[q.id] !== undefined;

  var body = "";

  if (q.type === "budget") {
    body = '<div class="budget-display">'
      + '<p class="budget-amount" id="bamt">' + fmt(budgetValue) + '</p>'
      + '<p class="budget-sub">per month</p></div>'
      + '<input type="range" min="200" max="5000" step="100" value="' + budgetValue + '" id="bslider" oninput="onSlider(this.value)">'
      + '<div class="budget-ticks"><span>$200</span><span>$1,000</span><span>$2,500</span><span>$5,000+</span></div>'
      + '<div class="budget-custom-wrap">'
      + '<p class="budget-custom-label">Or enter your exact budget:</p>'
      + '<div class="budget-custom-row">'
      + '<span class="budget-custom-prefix">$</span>'
      + '<input type="number" class="budget-custom-input" placeholder="e.g. 750" min="0" oninput="onCustomBudget(this.value)">'
      + '<span class="budget-custom-suffix">/mo</span>'
      + '</div></div>';
  } else {
    var isMulti = q.type === "multi";
    var isGrid  = q.type === "grid";
    if (isMulti) body += '<div class="multi-badge"><span class="multi-tag">Multi-select</span> Choose all that apply</div>';
    body += '<div class="' + (isGrid ? "options-grid" : "options") + '">';
    q.opts.forEach(function(o, i) {
      var selArr = Array.isArray(answers[q.id]) ? answers[q.id] : [];
      var isSel = isMulti ? selArr.indexOf(i) > -1 : answers[q.id] === i;
      body += '<button class="opt' + (isSel ? " selected" : "") + '" onclick="pick(' + i + ')">'
        + '<span class="opt-icon">' + o.icon + '</span>'
        + '<span><span class="opt-label">' + o.label + '</span>'
        + (o.desc ? '<span class="opt-desc">' + o.desc + '</span>' : '')
        + '</span></button>';
    });
    body += '</div>';
  }

  var html = '<div class="progress-wrap">'
    + '<div class="progress-top"><span class="progress-label">' + q.step + '</span><span class="progress-count">' + pct + '% complete</span></div>'
    + '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>'
    + '</div>'
    + '<div class="q-card">'
    + '<p class="q-step">' + q.step + '</p>'
    + '<p class="q-text">' + q.text + '</p>'
    + '<p class="q-hint">' + q.hint + '</p>'
    + body
    + '<div class="nav">'
    + (currentQ > 0 ? '<button class="btn-back" onclick="goBack()">Back</button>' : '<span></span>')
    + '<button class="btn-next' + (hasAns ? " active" : "") + '" id="btn-next" onclick="goNext()">'
    + (currentQ === Q.length - 1 ? "Build my plan" : "Next") + '</button>'
    + '</div></div>';

  document.getElementById("app").innerHTML = html;
}

function pick(i) {
  var q = Q[currentQ];
  if (q.type === "multi") {
    if (!Array.isArray(answers[q.id])) answers[q.id] = [];
    var idx = answers[q.id].indexOf(i);
    if (idx > -1) answers[q.id].splice(idx, 1);
    else answers[q.id].push(i);
    document.querySelectorAll(".opt").forEach(function(el, oi) {
      el.classList.toggle("selected", answers[q.id].indexOf(oi) > -1);
    });
    var nb = document.getElementById("btn-next");
    if (nb) nb.classList.toggle("active", answers[q.id].length > 0);
  } else {
    answers[q.id] = i;
    document.querySelectorAll(".opt").forEach(function(el, oi) {
      el.classList.toggle("selected", oi === i);
    });
    var nb2 = document.getElementById("btn-next");
    if (nb2) nb2.classList.add("active");
  }
}

function onSlider(val) {
  budgetValue = parseInt(val);
  answers.budget = budgetValue;
  var el = document.getElementById("bamt");
  if (el) el.textContent = budgetValue >= 5000 ? "$5,000+" : fmt(budgetValue);
}

function onCustomBudget(val) {
  var n = parseInt(val);
  if (!isNaN(n) && n > 0) {
    budgetValue = n;
    answers.budget = n;
    var sl = document.getElementById("bslider");
    if (sl) sl.value = Math.min(n, 5000);
    var el = document.getElementById("bamt");
    if (el) el.textContent = fmt(n);
  }
}

function goNext() {
  if (Q[currentQ].type === "budget") answers.budget = budgetValue;
  currentQ++;
  render();
  window.scrollTo(0, 0);
}

function goBack() {
  currentQ--;
  render();
  window.scrollTo(0, 0);
}

// ── LOADING ───────────────────────────────────────────────────────
var loadMsgs = [
  "Analyzing your business profile...",
  "Scoring services against your answers...",
  "Building 3 custom plans from our catalog...",
  "Personalizing your recommendation..."
];

function showLoading() {
  var stepsHtml = loadMsgs.map(function(m) {
    return '<div class="loading-step">' + m + '</div>';
  }).join("");
  document.getElementById("app").innerHTML =
    '<div class="q-card loading">'
    + '<div class="spinner"></div>'
    + '<p class="loading-title">Building your personalized plans...</p>'
    + '<p class="loading-sub">Our AI is pulling from our full service catalog to assemble 3 custom options matched to your answers.</p>'
    + '<div class="loading-steps" id="lsteps">' + stepsHtml + "</div></div>";

  var steps = document.querySelectorAll(".loading-step");
  var i = 0;
  var iv = setInterval(function() {
    if (i < steps.length) { steps[i].classList.add("done"); i++; }
    else clearInterval(iv);
  }, 650);

  setTimeout(buildResults, 3000);
}

// ── BUILD RESULTS ─────────────────────────────────────────────────
function buildResults() {
  var ind        = answers.industry !== undefined ? Q[0].opts[answers.industry].label : "General";
  var locIdx     = answers.locations !== undefined ? answers.locations : 0;
  var assets     = Array.isArray(answers.assets) ? answers.assets : [];
  var presence   = answers.presence !== undefined ? answers.presence : 2;
  var challenges = Array.isArray(answers.challenge) ? answers.challenge : [];
  var goals      = Array.isArray(answers.goals) ? answers.goals : [];
  var funnelIdx  = answers.funnel  !== undefined ? answers.funnel  : -1;
  var handsonIdx = answers.handson !== undefined ? answers.handson : 1;
  var timelineIdx = 1; // removed from quiz, default to mid-range
  var budget = answers.budget || budgetValue;

  var plans = buildPlan(budget, funnelIdx, presence, challenges, goals, handsonIdx, timelineIdx, ind, locIdx, assets);
  lastPlans = plans;

  var urgency = "Once you choose a plan, we will kick off with your highest-impact services first — typically GBP optimization and your website — so you start seeing results within the first 30 days.";

  var slots = ["optimal", "starter", "stretch"];
  var badges = ["Best Within Budget", "Good Starter", "Ideal for Your Goals"];
  var cardClasses = [" best", "", " stretch"];

  var html = '<div class="result">'
    + '<div class="result-header">'
    + '<h2>Your custom plans are ready</h2>'
    + '<p>We built 3 options from our full service catalog, matched to your ' + ind.split("/")[0].trim() + ' business and ' + fmt(budget) + '/mo budget.</p>'
    + '</div>';

  slots.forEach(function(slot, si) {
    var p = plans[slot];
    var lines = planLines(p);
    var servHtml = lines.slice(0, 6).map(function(l) {
      return '<div class="plan-service">' + l.label + '</div>';
    }).join("");
    var name = industryName(ind, si);
    var isBest = si === 0;

    html += '<div class="plan-card' + cardClasses[si] + '">'
      + '<div class="plan-card-top">'
      + '<span class="plan-badge">' + (si === 0 ? "✦ " : si === 1 ? "⚡ " : "🚀 ") + badges[si] + '</span>'
      + (isBest ? '<span class="best-tag">BEST FIT</span>' : '')
      + '</div>'
      + '<p class="plan-name">' + name + '</p>'
      + '<div class="plan-prices">'
      + '<div class="price-box"><p class="price-box-label">One-time setup</p><p class="price-box-val blue">' + fmt(p.setup) + '</p></div>'
      + '<div class="price-box"><p class="price-box-label">Monthly</p><p class="price-box-val green">' + fmt(p.monthly) + '/mo</p></div>'
      + '<div class="price-box budget-box"><p class="price-box-label">vs. budget</p><p class="price-box-val" style="font-size:13px">' + budgetTag(p.monthly, budget) + '</p></div>'
      + '</div>'
      + '<hr class="plan-divider">'
      + '<p class="plan-why">' + whyText(si, p.monthly, budget, funnelIdx, challenges, goals) + '</p>'
      + '<div class="plan-services"><p class="plan-services-title">Services included</p>' + servHtml + '</div>'
      + '<div class="plan-btns">'
      + '<button class="plan-btn-primary">Get started</button>'
      + '<button class="plan-btn-outline" onclick="openBd(' + si + ')">View breakdown</button>'
      + '<button class="plan-btn-outline" onclick="openCust(' + si + ')">Customize</button>'
      + '</div></div>';
  });

  if (urgency) {
    html += '<div class="urgency-box"><p class="urgency-title">Next step</p><p class="urgency-text">' + urgency + '</p></div>';
  }
  html += '<p class="restart-link" onclick="restart()">Start over with different answers</p></div>';
  document.getElementById("app").innerHTML = html;
  window.scrollTo(0, 0);
}

// ── BREAKDOWN MODAL ───────────────────────────────────────────────
var bdSlot = 0;
var custSlot = 0;
var slots = ["optimal", "starter", "stretch"];

function openBd(si) {
  bdSlot = si;
  var p = lastPlans[slots[si]];
  var lines = planLines(p);
  var moLines = lines.filter(function(l) { return l.monthly > 0; });
  var otLines = lines.filter(function(l) { return l.setup > 0; });

  document.getElementById("bd-title").textContent = industryName(
    answers.industry !== undefined ? Q[0].opts[answers.industry].label : "General", si
  ) + " — Full Breakdown";
  document.getElementById("bd-sub").textContent = fmt(p.monthly) + "/mo + " + fmt(p.setup) + " one-time setup";

  var html = "";
  if (moLines.length) {
    html += '<p class="modal-sec-title">Monthly Services</p>';
    moLines.forEach(function(l) {
      html += '<div class="bd-row"><span class="bd-label">' + l.label + '<span class="bd-tag mo">mo</span></span><span class="bd-val">' + fmt(l.monthly) + '/mo</span></div>';
    });
    html += '<div class="bd-subtotal"><span>Monthly total</span><span style="color:#1D9E75">' + fmt(p.monthly) + '/mo</span></div>';
  }
  if (otLines.length) {
    html += '<p class="modal-sec-title" style="margin-top:18px">One-Time Setup</p>';
    otLines.forEach(function(l) {
      html += '<div class="bd-row"><span class="bd-label">' + l.label + '<span class="bd-tag ot">setup</span></span><span class="bd-val">' + fmt(l.setup) + '</span></div>';
    });
    html += '<div class="bd-subtotal"><span>Setup total</span><span style="color:#185fa5">' + fmt(p.setup) + '</span></div>';
  }
  html += '<button class="modal-cta">Get started with this plan</button>'
    + '<button class="modal-cta-outline" onclick="document.getElementById(\'bd-overlay\').classList.remove(\'open\'); openCust(' + si + ')">Customize this plan</button>';

  document.getElementById("bd-body").innerHTML = html;
  document.getElementById("bd-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

document.getElementById("bd-close").onclick = function() {
  document.getElementById("bd-overlay").classList.remove("open");
  document.body.style.overflow = "";
};
document.getElementById("bd-overlay").onclick = function(e) {
  if (e.target === this) { this.classList.remove("open"); document.body.style.overflow = ""; }
};

// ── CUSTOMIZE MODAL ───────────────────────────────────────────────
var custInc = {};

function openCust(si) {
  custSlot = si;
  var p = lastPlans[slots[si]];
  custInc = JSON.parse(JSON.stringify(p.inc));
  renderCustModal(si);
  document.getElementById("cust-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function renderCustModal(si) {
  var name = answers.industry !== undefined ? Q[0].opts[answers.industry].label : "General";
  document.getElementById("cust-title").textContent = "Customize — " + industryName(name, si);

  var sections = [
    { keys: ["website", "hosting"], label: "Website & Hosting" },
    { keys: ["localSeo", "gbp", "reviewSys", "reviewAuto"], label: "Local SEO & Reputation" },
    { keys: ["socialAds", "smm", "feedPosts", "stories", "carousels", "video"], label: "Social Media, Ads & Content" },
    { keys: ["email"], label: "Email & SMS" },

    { keys: ["branding"], label: "Branding" }
  ];

  var html = "";
  sections.forEach(function(sec) {
    html += '<p class="modal-sec-title">' + sec.label + '</p>';
    sec.keys.forEach(function(key) {
      var svc = CAT[key];
      if (!svc) return;
      var isOn = custInc[key] !== undefined;

      if (svc.type === "toggle") {
        html += '<div class="cust-row">'
          + '<span class="cust-label">' + svc.label + '</span>'
          + '<span style="font-size:12px;color:#73726c;margin-right:8px">' + (svc.monthly ? fmt(svc.monthly) + "/mo" : "+" + fmt(svc.setup)) + '</span>'
          + '<button class="cust-toggle ' + (isOn ? "on" : "off") + '" onclick="custToggle(\'' + key + '\')" id="ct-' + key + '">'
          + '<div class="cust-thumb"></div></button>'
          + '</div>';
      } else if (svc.type === "tier" && svc.tiers) {
        var cur = isOn ? custInc[key] : -1;
        var opts = '<option value="-1"' + (cur === -1 ? " selected" : "") + '>Not included</option>';
        svc.tiers.forEach(function(t, i) {
          opts += '<option value="' + i + '"' + (cur === i ? " selected" : "") + '>'
            + t.name + " — " + (t.monthly ? fmt(t.monthly) + "/mo" : "+" + fmt(t.setup)) + '</option>';
        });
        html += '<div class="cust-row">'
          + '<span class="cust-label">' + svc.label + '</span>'
          + '<select class="cust-select" onchange="custTier(\'' + key + '\', this.value)">' + opts + '</select>'
          + '</div>';
      }
    });
  });

  var totals = calcCustTotals();
  html += '<div class="cust-totals" id="cust-totals-box">'
    + '<div class="cust-total-row"><span>Monthly recurring</span><span class="cust-total-val" id="cust-mo" style="color:#1D9E75">' + fmt(totals.monthly) + '/mo</span></div>'
    + '<div class="cust-total-row"><span>One-time setup</span><span class="cust-total-val" id="cust-setup" style="color:#185fa5">' + fmt(totals.setup) + '</span></div>'
    + '</div>'
    + '<button class="modal-cta" style="margin-top:14px">Get started with this custom plan</button>';

  document.getElementById("cust-body").innerHTML = html;
}

function calcCustTotals() {
  var mo = 0, setup = 0;
  Object.keys(custInc).forEach(function(key) {
    var svc = CAT[key];
    if (!svc) return;
    var val = custInc[key];
    if (svc.type === "toggle" && val === true) { mo += svc.monthly; setup += svc.setup; }
    else if (svc.type === "tier" && val !== undefined) { mo += svc.tiers[val].monthly; setup += svc.tiers[val].setup; }
    else if (svc.type === "dynamic" && typeof val === "number") { mo += val; }
  });
  return { monthly: mo, setup: setup };
}

function updateCustTotals() {
  var t = calcCustTotals();
  var em = document.getElementById("cust-mo");
  var es = document.getElementById("cust-setup");
  if (em) em.textContent = fmt(t.monthly) + "/mo";
  if (es) es.textContent = fmt(t.setup);
}

function custToggle(key) {
  var svc = CAT[key];
  var btn = document.getElementById("ct-" + key);
  if (custInc[key] !== undefined) {
    delete custInc[key];
    if (btn) { btn.classList.remove("on"); btn.classList.add("off"); }
  } else {
    custInc[key] = true;
    if (btn) { btn.classList.remove("off"); btn.classList.add("on"); }
  }
  updateCustTotals();
}

function custTier(key, val) {
  val = parseInt(val);
  if (val === -1) delete custInc[key];
  else custInc[key] = val;
  updateCustTotals();
}

function custAds(val) {
  var n = parseInt(val) || 0;
  if (n > 0) custInc.socialAds = n;
  else delete custInc.socialAds;
  updateCustTotals();
}

document.getElementById("cust-close").onclick = function() {
  document.getElementById("cust-overlay").classList.remove("open");
  document.body.style.overflow = "";
};
document.getElementById("cust-overlay").onclick = function(e) {
  if (e.target === this) { this.classList.remove("open"); document.body.style.overflow = ""; }
};

// ── RESTART ───────────────────────────────────────────────────────
function restart() {
  answers = {};
  currentQ = 0;
  budgetValue = 1000;
  lastPlans = null;
  render();
  window.scrollTo(0, 0);
}

// ── INIT ──────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
